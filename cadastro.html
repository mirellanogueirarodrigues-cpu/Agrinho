<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroViva - Cadastro do Produtor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="tela-cadastro" class="screen active">
        <div class="login-box">
            <h2>👨‍🌾 Cadastro do Produtor</h2>

            <div class="form-cadastro">
                <span class="label-form">Nome do Produtor</span>
                <input type="text" id="reg-nome" class="input" placeholder="Ex: João Silva">

                <span class="label-form">Telefone de Contato</span>
                <input type="tel" id="reg-fone" class="input" placeholder="(00) 00000-0000">

                <span class="label-form">CEP da Propriedade</span>
                <input type="text" id="reg-cep" class="input" placeholder="00000-000">

                <span class="label-form">Comunidade / Bairro Rural</span>
                <input type="text" id="reg-bairro" class="input" placeholder="Ex: Distrito de Nova Fátima">

                <hr>

                <h3>🌾 Informações Técnicas da Plantação</h3>

                <span class="label-form">Cultura Principal</span>
                <select id="reg-cultura" class="input">
                    <option value="">Selecione uma cultura</option>
                    <option value="Milho">Milho</option>
                    <option value="Soja">Soja</option>
                    <option value="Feijão">Feijão</option>
                    <option value="Tomate">Tomate</option>
                    <option value="Alface">Alface</option>
                    <option value="Mandioca">Mandioca</option>
                </select>

                <span class="label-form">Área Destinada ao Plantio (Hectares)</span>
                <input type="number" id="reg-area" class="input" placeholder="Ex: 15">

                <span class="label-form">Data em que foi realizado o Plantio</span>
                <input type="date" id="reg-plantio" class="input">

                <button class="btn-login" onclick="salvarCadastroEEntrar()">
                    Salvar Dados e Acessar Painel
                </button>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
